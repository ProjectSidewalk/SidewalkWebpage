@(inputId: String)(implicit messages: Messages)
@* Show/hide-password toggle shared by the auth dialog and the full-page auth forms; AuthModal.js swaps the two
   icons and the aria state on click. *@
<button type="button" class="au-eye" data-eye="@inputId" aria-pressed="false" aria-label="@Messages("authenticate.show.password")" data-label-show="@Messages("authenticate.show.password")" data-label-hide="@Messages("authenticate.hide.password")">
  <svg class="au-eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
  <svg class="au-eye-off ps-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
</button>
